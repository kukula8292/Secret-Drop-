<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Control</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>🥷</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
* { box-sizing:border-box; margin:0; padding:0; font-family:'Share Tech Mono', monospace; }


body { background:#010201; color:#00ff00; padding:40px; overflow-x:hidden; }
body::before { content:""; position:fixed; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at 20% 30%,#00ff0022,transparent 40%), radial-gradient(circle at 80% 70%,#00ff0022,transparent 40%); z-index:-2; }
body::after { content:""; position:fixed; top:0; left:0; width:100%; height:100%; background-image: linear-gradient(#00ff0022 1px, transparent 1px), linear-gradient(90deg,#00ff0022 1px, transparent 1px); background-size:40px 40px; opacity:0.2; z-index:-1; }


h1 { text-align:center; font-size:40px; margin-bottom:30px; text-shadow:0 0 12px #00ff00; }
h2 { text-shadow:0 0 6px #00ff00; margin-top:40px; margin-bottom:12px; }


.tabs { display:flex; justify-content:center; gap:20px; margin-bottom:20px; }
.tab { padding:8px 20px; border-radius:8px; cursor:pointer; border:1px solid #00ff0055; transition:0.2s; }
.tab.active { background:#001a00; box-shadow:0 0 10px #00ff00; }


.search-bar { display:flex; justify-content:center; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.search-bar input, .search-bar select { padding:8px 12px; width:200px; border-radius:6px; border:none; background:#001000; color:#00ff00; }
.search-bar label { font-size:14px; margin-left:6px; }


.analytics { text-align:center; margin-bottom:12px; font-size:16px; }


.grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px; }


.card { background:#001a00; border:1px solid #00ff0055; border-radius:10px; padding:16px; box-shadow:0 0 10px #00ff0033, inset 0 0 5px #00ff0011; transition:0.3s; }
.card:hover { transform:translateY(-4px) scale(1.01); box-shadow:0 0 15px #00ff00, inset 0 0 8px #00ff0033; }
input, textarea { width:100%; margin-top:8px; padding:8px; background:#001000; color:#00ff00; border:1px solid #00ff0055; border-radius:6px; }
textarea { resize:none; height:80px; }
button { margin-top:6px; padding:6px 12px; border:none; border-radius:6px; font-weight:bold; cursor:pointer; background:#00ff00; color:#001; transition:0.2s; }
button:hover { filter:brightness(1.2); transform:scale(1.05); }


.pagination { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-top:12px; }
.page-btn { padding:4px 10px; border:1px solid #00ff00; cursor:pointer; }
.page-btn.active { background:#001a00; box-shadow:0 0 6px #00ff00; }


#passPopup { position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display:flex; justify-content:center; align-items:center; flex-direction: column; z-index:1000; }
#passPopup input { padding:12px; border-radius:10px; border:none; font-size:16px; margin-bottom:12px; width:300px; background:#001; color:#00ff00; }
#passPopup button { padding:12px 20px; border:none; border-radius:10px; cursor:pointer; background:#00ff00; font-weight:bold; }


#hackerPopup { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:14px 24px; border-radius:16px; background:rgba(0,255,0,0.9); color:#001; font-weight:bold; box-shadow:0 6px 15px rgba(0,0,0,0.5); opacity:0; pointer-events:none; transition:0.4s; z-index:9999; text-align:center; min-width:200px; }


#analyticsTab { display:none; text-align:center; margin-top:20px; }
.chart { background:#001a00; border:1px solid #00ff0055; padding:16px; margin:10px auto; border-radius:10px; color:#00ff00; }
</style>
</head>
<body>


<div id="passPopup">
  <h1>ENTER ADMIN PASSWORD</h1>
  <input type="password" id="adminPass" placeholder="Password">
  <button id="enterBtn">ENTER</button>
</div>

<h1>HACKER ADMIN CONTROL PANEL</h1>

<div class="tabs">
  <div class="tab active" data-tab="all">All Messages</div>
  <div class="tab" data-tab="flagged">Flagged Messages</div>
  <div class="tab" data-tab="analytics">Analytics</div>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search messages by content">
  <label>Name:</label><input type="text" id="filterName" placeholder="Filter by name">
  <label>From:</label><input type="date" id="filterStart">
  <label>To:</label><input type="date" id="filterEnd">
</div>

<div class="analytics">
  Total Messages: <span id="totalCount">0</span> | Flagged Messages: <span id="flaggedCount">0</span>
</div>

<div id="all" class="grid"></div>
<div id="flagged" class="grid" style="display:none;"></div>
<div id="analyticsTab">
  <div class="chart" id="chartSummary">Loading analytics...</div>
</div>

<div class="pagination" id="pagination"></div>
<div id="hackerPopup">POPUP</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, deleteDoc, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBorukwZKOeJaxEYqY57zL1W-8zjevQlhg",
  authDomain: "messages-9e5da.firebaseapp.com",
  projectId: "messages-9e5da",
  storageBucket: "messages-9e5da.appspot.com",
  messagingSenderId: "1033254869246",
  appId: "1:1033254869246:web:9134daa1fe90389109adaf"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const passPopup = document.getElementById("passPopup");
const adminPass = document.getElementById("adminPass");
const enterBtn = document.getElementById("enterBtn");
const allGrid = document.getElementById("all");
const flaggedGrid = document.getElementById("flagged");
const hackerPopup = document.getElementById("hackerPopup");
const searchInput = document.getElementById("searchInput");
const totalCountEl = document.getElementById("totalCount");
const flaggedCountEl = document.getElementById("flaggedCount");
const paginationEl = document.getElementById("pagination");
const filterName = document.getElementById("filterName");
const filterStart = document.getElementById("filterStart");
const filterEnd = document.getElementById("filterEnd");
const analyticsTab = document.getElementById("analyticsTab");
const chartSummary = document.getElementById("chartSummary");

let allMessages = [];
let flaggedMessages = [];
let currentPage = 1;
const pageSize = 10;
let activeTab = 'all';

function showPopup(msg, color="rgba(0,255,0,0.9)", duration=2500){
  hackerPopup.textContent = msg;
  hackerPopup.style.background = color;
  hackerPopup.style.opacity = "1";
  hackerPopup.style.pointerEvents = "auto";
  setTimeout(()=>{ hackerPopup.style.opacity="0"; hackerPopup.style.pointerEvents="none"; }, duration);
}


function loginAdmin(){
  const pw = adminPass.value.trim();
  const hashed = "rama338"; 
  if(pw===hashed){
    passPopup.style.display="none";
    showPopup("Access Granted","#00ff00");
    initAdminPanel();
  } else {
    showPopup("Access Denied","rgba(255,0,0,0.9)");
    adminPass.value="";
    adminPass.focus();
  }
}

enterBtn.addEventListener("click", loginAdmin);
adminPass.addEventListener("keydown", e=>{ if(e.key==="Enter") loginAdmin(); });


function initAdminPanel(){
  const qAll = query(collection(db,"messages"), orderBy("date","desc"));
  onSnapshot(qAll, snapshot=>{
    allMessages = snapshot.docs.map(d=>({id:d.id, ...d.data()}));
    totalCountEl.textContent = allMessages.length;
    renderGrid();
    renderAnalytics();
  });
  
  const qFlagged = query(collection(db,"flaggedMessages"), orderBy("date","desc"));
  onSnapshot(qFlagged, snapshot=>{
    flaggedMessages = snapshot.docs.map(d=>({id:d.id, ...d.data()}));
    flaggedCountEl.textContent = flaggedMessages.length;
    renderGrid();
    renderAnalytics();
  });
}


function renderGrid(){
  const grid = activeTab==="all"?allGrid:activeTab==="flagged"?flaggedGrid:null;
  if(!grid) return;

  const messages = activeTab==="all"?allMessages:flaggedMessages;
  grid.innerHTML="";
  const searchTerm = searchInput.value.toLowerCase();
  const nameFilter = filterName.value.toLowerCase();
  const startDate = filterStart.value? new Date(filterStart.value): null;
  const endDate = filterEnd.value? new Date(filterEnd.value): null;

  const filtered = messages.filter(m=>{
    const messageMatch = m.message.toLowerCase().includes(searchTerm);
    const nameMatch = m.name.toLowerCase().includes(nameFilter);
    const date = m.date?.toDate ? m.date.toDate() : m.date;
    const startMatch = startDate? date >= startDate : true;
    const endMatch = endDate? date <= endDate : true;
    return messageMatch && nameMatch && startMatch && endMatch;
  });

  const paginated = filtered.slice((currentPage-1)*pageSize, currentPage*pageSize);

  if(paginated.length===0){ 
    const empty = document.createElement("div"); 
    empty.textContent="No messages found 🤫"; 
    empty.style.textAlign="center"; 
    grid.appendChild(empty); 
  }

  paginated.forEach(m=>{
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML = `
      <div class="name">Name: ${m.name}</div>
      <div class="date">Date: ${m.date?.toDate? m.date.toDate().toLocaleString() : ""}</div>
      <div class="message">${m.message}</div>
      <div class="meta">
        IP: ${m.ip || "Unknown"} <br>
        Device: ${m.userAgent || "Unknown"} <br>
        Location: ${m.geo?.city || ""}, ${m.geo?.region || ""}, ${m.geo?.country || ""} <br>
        Last Edited: ${m.lastEdited?.toDate ? m.lastEdited.toDate().toLocaleString() : "-"}
      </div>
      <button class="editBtn" style="background:#ff6600;color:#001;">Edit</button>
      <button class="approveBtn">Approve</button>
      <button class="deleteBtn" style="background:#ff0000;color:#fff;">Delete</button>
    `;
    const approveBtn = card.querySelector(".approveBtn");
    const deleteBtn = card.querySelector(".deleteBtn");
    const editBtn = card.querySelector(".editBtn");

    approveBtn.addEventListener("click", async ()=>{
      if(activeTab==="flagged"){
        await addDoc(collection(db,"messages"),{name:m.name,message:m.message,date:m.date,ip:m.ip,userAgent:m.userAgent,geo:m.geo,lastEdited:m.lastEdited || m.date});
        await deleteDoc(doc(db,"flaggedMessages",m.id));
        showPopup("Message Approved","#00ff00");
      }
    });
    deleteBtn.addEventListener("click", async ()=>{
      await deleteDoc(doc(db,activeTab==="all"?"messages":"flaggedMessages",m.id));
      showPopup("Message Deleted","rgba(255,0,0,0.9)");
    });
    editBtn.addEventListener("click", ()=>{
      const newMsg = prompt("Edit message:", m.message);
      if(newMsg!==null){
        updateDoc(doc(db,activeTab==="all"?"messages":"flaggedMessages",m.id),{
          message:newMsg,
          lastEdited: serverTimestamp()
        });
        showPopup("Message Edited","#ff6600");
      }
    });

    grid.appendChild(card);
  });

  renderPagination(filtered.length);
}


[searchInput, filterName, filterStart, filterEnd].forEach(el=>{
  el.addEventListener("input", ()=>{
    currentPage=1;
    renderGrid();
  });
});


document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    activeTab = tab.dataset.tab;
    allGrid.style.display=activeTab==="all"?"grid":"none";
    flaggedGrid.style.display=activeTab==="flagged"?"grid":"none";
    analyticsTab.style.display=activeTab==="analytics"?"block":"none";
    currentPage=1;
    renderGrid();
  });
});

function renderPagination(total){
  paginationEl.innerHTML="";
  const pages = Math.ceil(total/pageSize);
  for(let i=1;i<=pages;i++){
    const btn = document.createElement("div");
    btn.className="page-btn"+(i===currentPage?" active":"");
    btn.textContent=i;
    btn.addEventListener("click",()=>{ currentPage=i; renderGrid(); });
    paginationEl.appendChild(btn);
  }
}


function renderAnalytics(){
  const total = allMessages.length;
  const flagged = flaggedMessages.length;
  const approved = total - flagged;
  
  let devices = {};
  let countries = {};
  let users = {};
  allMessages.concat(flaggedMessages).forEach(m=>{
    if(m.userAgent) devices[m.userAgent] = (devices[m.userAgent]||0)+1;
    if(m.geo?.country) countries[m.geo.country] = (countries[m.geo.country]||0)+1;
    if(m.name) users[m.name] = (users[m.name]||0)+1;
  });
  
  let summary = `
    Total Messages: ${total} <br>
    Approved Messages: ${approved} <br>
    Flagged Messages: ${flagged} <br>
    <hr>
    <b>Top Users:</b> ${Object.entries(users).sort((a,b)=>b[1]-a[1]).slice(0,5).map(u=>`${u[0]}(${u[1]})`).join(", ")} <br>
    <b>Top Devices:</b> ${Object.entries(devices).sort((a,b)=>b[1]-a[1]).slice(0,5).map(u=>`${u[0]}(${u[1]})`).join(", ")} <br>
    <b>Top Countries:</b> ${Object.entries(countries).sort((a,b)=>b[1]-a[1]).slice(0,5).map(u=>`${u[0]}(${u[1]})`).join(", ")}
  `;
  chartSummary.innerHTML = summary;
}


onSnapshot(query(collection(db,"flaggedMessages"), orderBy("date","desc")), snapshot=>{
  if(snapshot.docChanges().some(change=>change.type==="added")){
    showPopup("New Flagged Message!","#ff0000");
  }
});
</script>
</body>
</html>
