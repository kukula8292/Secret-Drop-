<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Control</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>🥷</text></svg>">
<link rel="stylesheet" href="styles.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap');

.dark-mode { background: #0a0e27; color: #00ff00; padding: 40px; overflow-x: hidden; position: relative; font-family: 'Fira Code', monospace; }

.dark-mode::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 30%, #00ff0015, transparent 40%), radial-gradient(circle at 80% 70%, #00ff0015, transparent 40%);
  z-index: -2;
  pointer-events: none;
}

.dark-mode::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(#00ff0008 1px, transparent 1px), linear-gradient(90deg, #00ff0008 1px, transparent 1px);
  background-size: 50px 50px;
  opacity: 0.3;
  z-index: -1;
  pointer-events: none;
  animation: scan 8s linear infinite;
}

@keyframes scan {
  0% { background-position: 0 0; }
  100% { background-position: 50px 50px; }
}

h1 {
  text-align: center;
  font-size: 40px;
  margin-bottom: 30px;
  text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff0080;
  animation: glow 2s ease-in-out infinite;
  position: relative;
  z-index: 10;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff0080; }
  50% { text-shadow: 0 0 30px #00ff00, 0 0 60px #00ff0080, 0 0 80px #00ff0040; }
}

.tabs {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 30px;
  flex-wrap: wrap;
  position: relative;
  z-index: 10;
}

.tab {
  padding: 12px 24px;
  border-radius: 10px;
  cursor: pointer;
  border: 2px solid #00ff0055;
  background: transparent;
  color: #00ff00;
  font-weight: 600;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-family: 'Fira Code', monospace;
  font-size: 14px;
}

.tab:hover {
  border-color: #00ff00;
  transform: translateY(-3px);
  box-shadow: 0 0 15px #00ff0080;
}

.tab.active {
  background: rgba(0, 255, 0, 0.1);
  border-color: #00ff00;
  box-shadow: 0 0 20px #00ff00, inset 0 0 10px #00ff0020;
  transform: scale(1.05);
}

.search-bar {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 30px;
  flex-wrap: wrap;
  position: relative;
  z-index: 10;
}

.search-bar input {
  padding: 12px 16px;
  width: 220px;
  border-radius: 8px;
  border: 2px solid #00ff0055;
  background: rgba(0, 255, 0, 0.05);
  color: #00ff00;
  font-family: 'Fira Code', monospace;
  font-size: 13px;
  transition: all 0.3s ease;
}

.search-bar input:focus {
  outline: none;
  border-color: #00ff00;
  background: rgba(0, 255, 0, 0.1);
  box-shadow: 0 0 15px #00ff0080;
  transform: translateY(-2px);
}

.search-bar input::placeholder {
  color: #00ff0080;
}

.search-bar label {
  font-size: 13px;
  color: #00ff00;
  display: flex;
  align-items: center;
  font-weight: 600;
}

.analytics {
  text-align: center;
  margin-bottom: 30px;
  font-size: 15px;
  padding: 16px;
  background: rgba(0, 255, 0, 0.08);
  border: 1px solid #00ff0055;
  border-radius: 10px;
  box-shadow: 0 0 20px #00ff0020;
  position: relative;
  z-index: 10;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 24px;
  margin-bottom: 40px;
  position: relative;
  z-index: 10;
}

.card {
  background: rgba(0, 30, 0, 0.6);
  border: 2px solid #00ff0055;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 0 15px #00ff0020, inset 0 0 10px #00ff000a;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  animation: cardSlide 0.6s ease;
}

@keyframes cardSlide {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.card:hover {
  transform: translateY(-8px);
  border-color: #00ff00;
  box-shadow: 0 0 30px #00ff00, inset 0 0 15px #00ff0015;
  background: rgba(0, 40, 0, 0.8);
}

.card > div {
  margin-bottom: 12px;
  font-size: 13px;
  line-height: 1.6;
}

.name { font-weight: 700; color: #00ff00; margin-bottom: 8px; }

.date { opacity: 0.7; font-size: 12px; }

.message { opacity: 0.85; line-height: 1.5; max-height: 100px; overflow-y: auto; }

.meta { opacity: 0.6; font-size: 11px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #00ff0033; }

button {
  margin-top: 12px;
  padding: 8px 14px;
  border: none;
  border-radius: 6px;
  font-weight: 700;
  cursor: pointer;
  background: #00ff00;
  color: #001;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-family: 'Fira Code', monospace;
  font-size: 12px;
  margin-right: 6px;
  display: inline-block;
}

button:hover {
  filter: brightness(1.3);
  transform: scale(1.08);
  box-shadow: 0 0 20px #00ff00;
}

button:active {
  transform: scale(0.95);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.pagination {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 30px;
  position: relative;
  z-index: 10;
}

.page-btn {
  padding: 8px 12px;
  border: 2px solid #00ff00;
  background: transparent;
  color: #00ff00;
  cursor: pointer;
  border-radius: 6px;
  font-family: 'Fira Code', monospace;
  transition: all 0.3s ease;
  font-weight: 600;
}

.page-btn:hover {
  background: rgba(0, 255, 0, 0.2);
  transform: translateY(-2px);
}

.page-btn.active {
  background: #00ff00;
  color: #001;
  box-shadow: 0 0 15px #00ff00;
}

#passPopup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.98);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 1000;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

#passPopup h1 {
  margin-bottom: 20px;
}

#passPopup input {
  padding: 14px;
  border-radius: 10px;
  border: 2px solid #00ff00;
  font-size: 16px;
  margin-bottom: 16px;
  width: 300px;
  background: rgba(0, 255, 0, 0.05);
  color: #00ff00;
  font-family: 'Fira Code', monospace;
  transition: all 0.3s ease;
}

#passPopup input:focus {
  outline: none;
  box-shadow: 0 0 20px #00ff00;
  background: rgba(0, 255, 0, 0.1);
}

#passPopup button {
  padding: 14px 28px;
  border: 2px solid #00ff00;
  background: #00ff00;
  color: #001;
  font-weight: 700;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 15px;
  margin: 0;
}

#passPopup button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #00ff00;
}

#hackerPopup {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 16px 28px;
  border-radius: 12px;
  background: rgba(0, 255, 0, 0.95);
  color: #001;
  font-weight: 700;
  box-shadow: 0 0 30px #00ff00;
  opacity: 0;
  pointer-events: none;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 9999;
  text-align: center;
  min-width: 220px;
  font-size: 14px;
  animation: slideInRight 0.3s ease;
}

@keyframes slideInRight {
  from { transform: translateX(400px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

#hackerPopup.show {
  opacity: 1;
  pointer-events: auto;
}

#analyticsTab {
  display: none;
  text-align: center;
  margin-top: 30px;
}

.chart {
  background: rgba(0, 30, 0, 0.6);
  border: 2px solid #00ff0055;
  padding: 20px;
  margin: 10px auto;
  border-radius: 12px;
  color: #00ff00;
  max-width: 800px;
  box-shadow: 0 0 20px #00ff0020;
  line-height: 1.8;
  font-size: 13px;
}

.chart b { color: #00ff00; }

.chart hr { border: none; border-top: 1px solid #00ff0055; margin: 12px 0; }

@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
  .tabs { flex-direction: column; align-items: center; }
  .tab { width: 100%; }
  #passPopup input { width: 85vw; }
  h1 { font-size: 28px; }
}
</style>
</head>

<body class="dark-mode">

<div id="passPopup">
  <h1>🔐 ADMIN ACCESS</h1>
  <input type="password" id="adminPass" placeholder="Enter password">
  <button id="enterBtn">ENTER SYSTEM</button>
</div>

<h1>⚡ ADMIN CONTROL PANEL</h1>

<div class="tabs">
  <div class="tab active" data-tab="all">📨 All Messages</div>
  <div class="tab" data-tab="flagged">⚠️ Flagged Messages</div>
  <div class="tab" data-tab="analytics">📊 Analytics</div>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search messages...">
  <label>Name:</label><input type="text" id="filterName" placeholder="Filter by name">
  <label>From:</label><input type="date" id="filterStart">
  <label>To:</label><input type="date" id="filterEnd">
</div>

<div class="analytics">
  Total: <span id="totalCount">0</span> | Flagged: <span id="flaggedCount">0</span>
</div>

<div id="all" class="grid"></div>
<div id="flagged" class="grid" style="display:none;"></div>
<div id="analyticsTab">
  <div class="chart" id="chartSummary">Loading analytics...</div>
</div>

<div class="pagination" id="pagination"></div>
<div id="hackerPopup"></div>

<script src="utils.js" type="module"></script>
<script type="module">
import { toast, rateLimiter } from './utils.js';
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, deleteDoc, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBorukwZKOeJaxEYqY57zL1W-8zjevQlhg",
  authDomain: "messages-9e5da.firebaseapp.com",
  projectId: "messages-9e5da",
  storageBucket: "messages-9e5da.appspot.com",
  messagingSenderId: "1033254869246",
  appId: "1:1033254869246:web:9134daa1fe90389109adaf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const passPopup = document.getElementById("passPopup");
const adminPass = document.getElementById("adminPass");
const enterBtn = document.getElementById("enterBtn");
const allGrid = document.getElementById("all");
const flaggedGrid = document.getElementById("flagged");
const hackerPopup = document.getElementById("hackerPopup");
const searchInput = document.getElementById("searchInput");
const totalCountEl = document.getElementById("totalCount");
const flaggedCountEl = document.getElementById("flaggedCount");
const paginationEl = document.getElementById("pagination");
const filterName = document.getElementById("filterName");
const filterStart = document.getElementById("filterStart");
const filterEnd = document.getElementById("filterEnd");
const analyticsTab = document.getElementById("analyticsTab");
const chartSummary = document.getElementById("chartSummary");

let allMessages = [];
let flaggedMessages = [];
let currentPage = 1;
const pageSize = 10;
let activeTab = 'all';

function showPopup(msg, color = "rgba(0,255,0,0.9)", duration = 2500) {
  hackerPopup.textContent = msg;
  hackerPopup.style.background = color;
  hackerPopup.classList.add("show");
  setTimeout(() => hackerPopup.classList.remove("show"), duration);
}

function loginAdmin() {
  if(rateLimiter.isLimited()) {
    toast.error("Too many attempts. Please wait.");
    return;
  }

  const pw = adminPass.value.trim();
  const hashed = "rama338";
  if(pw === hashed) {
    passPopup.style.display = "none";
    showPopup("✅ ACCESS GRANTED", "#00ff00", 2000);
    initAdminPanel();
  } else {
    showPopup("❌ INVALID PASSWORD", "rgba(255, 0, 0, 0.9)", 2000);
    adminPass.value = "";
    adminPass.focus();
  }
}

enterBtn.addEventListener("click", loginAdmin);
adminPass.addEventListener("keydown", e => {
  if(e.key === "Enter") loginAdmin();
});

function initAdminPanel() {
  const qAll = query(collection(db, "messages"), orderBy("date", "desc"));
  onSnapshot(qAll, snapshot => {
    allMessages = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
    totalCountEl.textContent = allMessages.length;
    renderGrid();
    renderAnalytics();
  });

  const qFlagged = query(collection(db, "flaggedMessages"), orderBy("date", "desc"));
  onSnapshot(qFlagged, snapshot => {
    flaggedMessages = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
    flaggedCountEl.textContent = flaggedMessages.length;
    renderGrid();
    renderAnalytics();
  });
}

function renderGrid() {
  const grid = activeTab === "all" ? allGrid : activeTab === "flagged" ? flaggedGrid : null;
  if(!grid) return;

  const messages = activeTab === "all" ? allMessages : flaggedMessages;
  grid.innerHTML = "";

  const searchTerm = searchInput.value.toLowerCase();
  const nameFilter = filterName.value.toLowerCase();
  const startDate = filterStart.value ? new Date(filterStart.value) : null;
  const endDate = filterEnd.value ? new Date(filterEnd.value) : null;

  const filtered = messages.filter(m => {
    const messageMatch = m.message.toLowerCase().includes(searchTerm);
    const nameMatch = m.name.toLowerCase().includes(nameFilter);
    const date = m.date?.toDate ? m.date.toDate() : m.date;
    const startMatch = startDate ? date >= startDate : true;
    const endMatch = endDate ? date <= endDate : true;
    return messageMatch && nameMatch && startMatch && endMatch;
  });

  const paginated = filtered.slice((currentPage - 1) * pageSize, currentPage * pageSize);

  if(paginated.length === 0) {
    const empty = document.createElement("div");
    empty.textContent = "No messages found";
    empty.style.textAlign = "center";
    empty.style.gridColumn = "1 / -1";
    empty.style.padding = "40px";
    empty.style.opacity = "0.6";
    grid.appendChild(empty);
  }

  paginated.forEach(m => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="name">👤 ${m.name}</div>
      <div class="date">🕐 ${m.date?.toDate ? m.date.toDate().toLocaleString() : ""}</div>
      <div class="message">${m.message}</div>
      <div class="meta">
        📍 IP: ${m.ip || "Unknown"}<br>
        🖥️ Device: ${m.userAgent ? m.userAgent.substring(0, 50) + "..." : "Unknown"}<br>
        ✏️ Edited: ${m.lastEdited?.toDate ? m.lastEdited.toDate().toLocaleString() : "-"}
      </div>
    `;

    const buttonDiv = document.createElement("div");
    buttonDiv.style.marginTop = "12px";

    const editBtn = document.createElement("button");
    editBtn.textContent = "✏️ Edit";
    editBtn.style.background = "#FFA500";
    editBtn.style.color = "#001";

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "🗑️ Delete";
    deleteBtn.style.background = "#FF4444";

    const approveBtn = document.createElement("button");
    approveBtn.textContent = "✅ Approve";

    const copyBtn = document.createElement("button");
    copyBtn.textContent = "📋 Copy";

    editBtn.addEventListener("click", () => {
      const newMsg = prompt("Edit message:", m.message);
      if(newMsg !== null) {
        updateDoc(doc(db, activeTab === "all" ? "messages" : "flaggedMessages", m.id), {
          message: newMsg,
          lastEdited: serverTimestamp()
        });
        showPopup("✏️ Message edited", "#00ff00", 1500);
      }
    });

    deleteBtn.addEventListener("click", async () => {
      await deleteDoc(doc(db, activeTab === "all" ? "messages" : "flaggedMessages", m.id));
      showPopup("🗑️ Message deleted", "rgba(255, 100, 100, 0.9)", 1500);
    });

    approveBtn.addEventListener("click", async () => {
      if(activeTab === "flagged") {
        await addDoc(collection(db, "messages"), {
          name: m.name,
          message: m.message,
          date: m.date,
          ip: m.ip,
          userAgent: m.userAgent,
          geo: m.geo,
          lastEdited: m.lastEdited || m.date
        });
        await deleteDoc(doc(db, "flaggedMessages", m.id));
        showPopup("✅ Message approved", "#00ff00", 1500);
      }
    });

    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(m.message);
      toast.success("Copied!");
    });

    buttonDiv.appendChild(copyBtn);
    buttonDiv.appendChild(editBtn);
    if(activeTab === "flagged") buttonDiv.appendChild(approveBtn);
    buttonDiv.appendChild(deleteBtn);
    card.appendChild(buttonDiv);
    grid.appendChild(card);
  });

  renderPagination(filtered.length);
}

[searchInput, filterName, filterStart, filterEnd].forEach(el => {
  el.addEventListener("input", () => {
    currentPage = 1;
    renderGrid();
  });
});

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    activeTab = tab.dataset.tab;
    allGrid.style.display = activeTab === "all" ? "grid" : "none";
    flaggedGrid.style.display = activeTab === "flagged" ? "grid" : "none";
    analyticsTab.style.display = activeTab === "analytics" ? "block" : "none";
    currentPage = 1;
    renderGrid();
  });
});

function renderPagination(total) {
  paginationEl.innerHTML = "";
  const pages = Math.ceil(total / pageSize);
  for(let i = 1; i <= pages; i++) {
    const btn = document.createElement("div");
    btn.className = "page-btn" + (i === currentPage ? " active" : "");
    btn.textContent = i;
    btn.addEventListener("click", () => {
      currentPage = i;
      renderGrid();
    });
    paginationEl.appendChild(btn);
  }
}

function renderAnalytics() {
  const total = allMessages.length;
  const flagged = flaggedMessages.length;
  const approved = total - flagged;

  let devices = {};
  let countries = {};
  let users = {};
  allMessages.concat(flaggedMessages).forEach(m => {
    if(m.userAgent) devices[m.userAgent] = (devices[m.userAgent] || 0) + 1;
    if(m.geo?.country) countries[m.geo.country] = (countries[m.geo.country] || 0) + 1;
    if(m.name) users[m.name] = (users[m.name] || 0) + 1;
  });

  let summary = `
    <b>📊 Statistics</b><br>
    Total: ${total} | Approved: ${approved} | Flagged: ${flagged}<br>
    <hr>
    <b>👥 Top Users:</b> ${Object.entries(users).sort((a,b)=>b[1]-a[1]).slice(0,5).map(u=>`${u[0]}(${u[1]})`).join(", ") || "None"}<br>
    <b>🖥️ Top Devices:</b> ${Object.entries(devices).sort((a,b)=>b[1]-a[1]).slice(0,3).map(u=>`${u[0].substring(0,30)}(${u[1]})`).join(", ") || "None"}<br>
    <b>🌍 Top Countries:</b> ${Object.entries(countries).sort((a,b)=>b[1]-a[1]).slice(0,5).map(u=>`${u[0]}(${u[1]})`).join(", ") || "None"}
  `;
  chartSummary.innerHTML = summary;
}

onSnapshot(query(collection(db, "flaggedMessages"), orderBy("date", "desc")), snapshot => {
  if(snapshot.docChanges().some(change => change.type === "added")) {
    showPopup("⚠️ NEW FLAGGED MESSAGE!", "rgba(255, 150, 0, 0.9)", 3000);
  }
});
</script>
</body>
</html>
